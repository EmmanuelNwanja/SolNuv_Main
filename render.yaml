services:
  - type: web
    name: solnuv-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        value: SolNuv
      - key: TERMII_BASE_URL
        value: https://api.ng.termii.com/api
      - key: BREVO_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://solnuv.com
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SILVER_PRICE_USD_PER_GRAM
        value: 0.96
      - key: USD_TO_NGN_RATE
        value: 1620
