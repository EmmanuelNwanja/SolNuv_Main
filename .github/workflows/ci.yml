name: SolNuv CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint --if-present

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck --if-present

      - name: Run backend NERC smoke regression
        if: ${{ vars.RUN_NERC_SMOKE == 'true' }}
        working-directory: backend
        run: npm run test:nerc-regression --if-present

      - name: Run simulation golden regression
        working-directory: backend
        run: npm run test:simulation-golden --if-present

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

  cloudflare-purge:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Purge Cloudflare edge cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare purge skipped: CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN must be configured."
            exit 0
          fi

          response=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          echo "$response"
          echo "$response" | grep -q '"success":true'

  # Daily cron - decommission alerts + leaderboard refresh
  daily-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Run daily cron via API
        run: |
          curl --fail --show-error --silent --max-time 20 -X POST "${{ secrets.API_URL }}/api/cron/daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
