<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolNuv Offline</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; display: grid; place-items: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; width: min(92vw, 500px); }
    h1 { margin: 0 0 8px; color: #0d3b2e; }
    p { margin: 6px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>SolNuv is still available with cached pages.</p>
    <p>If you saved cable compliance entries while offline, they will sync automatically when your connection returns.</p>
  </div>
</body>
</html>
